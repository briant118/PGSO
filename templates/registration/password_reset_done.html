<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check your email – PGSO</title>
  {% load static %}
  <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a5f 0%, #152a45 50%, #0f1f33 100%);
      color: #1a1d24;
    }
    .login-bg-pattern {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(66, 153, 225, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(99, 179, 237, 0.1) 0%, transparent 45%);
      pointer-events: none;
    }
    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
    }
    .login-header { text-align: center; margin-bottom: 1.5rem; }
    .login-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .login-title { margin: 0; font-size: 1.75rem; font-weight: 700; color: #1a1d24; }
    .login-subtitle { margin: 0.35rem 0 0; font-size: 0.95rem; color: #5f6368; line-height: 1.5; }
    .login-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; }
    .login-footer a { color: #1e3a5f; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
    .success-icon { font-size: 3rem; color: #28a745; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-bg-pattern"></div>
  <div class="login-card">
    <div class="login-header">
      <div class="success-icon"><i class="fas fa-check-circle"></i></div>
      <h1 class="login-title">Check your email</h1>
      <p class="login-subtitle">Your request has been submitted. An admin will confirm and send a new password to your email.</p>
    </div>
    <p class="login-footer"><a href="{% url 'login' %}"><i class="fas fa-arrow-left"></i> Back to sign in</a></p>
  </div>
</body>
</html>
