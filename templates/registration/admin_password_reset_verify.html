<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Reset Password – PGSO</title>
  {% load static %}
  <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a5f 0%, #152a45 50%, #0f1f33 100%);
      color: #1a1d24;
    }
    .login-bg-pattern {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(66, 153, 225, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(99, 179, 237, 0.1) 0%, transparent 45%);
      pointer-events: none;
    }
    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
    }
    .login-header { text-align: center; margin-bottom: 1.5rem; }
    .login-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .login-title { margin: 0; font-size: 1.65rem; font-weight: 700; color: #1a1d24; }
    .login-subtitle { margin: 0.35rem 0 0; font-size: 0.95rem; color: #5f6368; line-height: 1.5; }

    .login-form .form-group { margin-bottom: 1.25rem; }
    .login-form label { display: block; font-weight: 600; color: #1a1d24; margin-bottom: 0.4rem; font-size: 0.9rem; }
    .login-form input[type="text"],
    .login-form input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
    }
    .login-form input:focus {
      outline: none;
      border-color: #1e3a5f;
      box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.15);
    }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 2.75rem; }
    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #5f6368;
      cursor: pointer;
      padding: 0.25rem;
      font-size: 1.1rem;
    }
    .password-toggle:hover { color: #1e3a5f; }

    .login-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #1e3a5f 0%, #152a45 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(30, 58, 95, 0.35);
    }
    .login-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #5f6368; }
    .login-footer a { color: #1e3a5f; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
    .alert { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; background: #fee; color: #c53030; }
  </style>
</head>
<body>
  <div class="login-bg-pattern"></div>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🏛️</div>
      <h1 class="login-title">Reset Admin Password</h1>
      <p class="login-subtitle">Enter the 4-digit OTP sent to the admin email and choose a new password.</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'admin_password_reset_verify' %}?token={{ token|urlencode }}" class="login-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_otp">OTP (4 digits)</label>
        <input type="text" name="otp" id="id_otp" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" minlength="4" required autofocus placeholder="Enter OTP">
      </div>

      <div class="form-group">
        <label for="id_new_password">New password</label>
        <div class="password-wrap">
          <input type="password" name="new_password" id="id_new_password" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password">
          <button type="button" class="password-toggle" id="toggleNewPass" title="Show password" aria-label="Show password">
            <i class="fas fa-eye" id="toggleNewPassIcon"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="id_new_password_confirm">Confirm password</label>
        <div class="password-wrap">
          <input type="password" name="new_password_confirm" id="id_new_password_confirm" required minlength="8" placeholder="Re-enter password" autocomplete="new-password">
          <button type="button" class="password-toggle" id="toggleNewPass2" title="Show password" aria-label="Show password">
            <i class="fas fa-eye" id="toggleNewPassIcon2"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-save" style="margin-right: 0.5rem;"></i> Update password
      </button>
    </form>

    <p class="login-footer"><a href="{% url 'admin_password_reset' %}"><i class="fas fa-redo"></i> Request new OTP</a></p>
    <p class="login-footer"><a href="{% url 'login' %}"><i class="fas fa-arrow-left"></i> Back to sign in</a></p>
  </div>

  <script>
    (function() {
      function setup(btnId, iconId, inputId) {
        var btn = document.getElementById(btnId);
        var icon = document.getElementById(iconId);
        var input = document.getElementById(inputId);
        if (!btn || !input) return;
        btn.addEventListener('click', function() {
          if (input.type === 'password') {
            input.type = 'text';
            if (icon) icon.className = 'fas fa-eye-slash';
            btn.title = 'Hide password';
            btn.setAttribute('aria-label', 'Hide password');
          } else {
            input.type = 'password';
            if (icon) icon.className = 'fas fa-eye';
            btn.title = 'Show password';
            btn.setAttribute('aria-label', 'Show password');
          }
        });
      }
      setup('toggleNewPass', 'toggleNewPassIcon', 'id_new_password');
      setup('toggleNewPass2', 'toggleNewPassIcon2', 'id_new_password_confirm');
    })();
  </script>
</body>
</html>
